general {
    no_fade_in = false              # Enable smooth fade-in animation
    grace = 0                       # Grace period before requiring password
    disable_loading_bar = false     # Show loading indicator
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/widescreen_wallpaper.jpg
    blur_passes = 3
    contrast = 1
    brightness = 0.5
    vibrancy_darkness = 10
}

image {
    monitor =
    path = ~/Pictures/profile.png
    border_size = 2
    border_color = rgba(255, 255, 255, 0)
    size = 160
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 3
    dots_size = 0.2                 # Password dot size (0.2-0.8)
    dots_spacing = 0.2              # Spacing between dots (0.0-1.0)
    dots_center = true              # Center dots in field
    outer_color = rgba(0, 0, 0, 0)

    inner_color = rgba(282A3699)
    font_color = rgb(F8F8F2)
    fail_color = rgb(FF5555)
    check_color = rgb(6272A4)

    fade_on_empty = false
    font_family = Noto Sans Mono
    placeholder_text = <span foreground="##cdd6f499">🔒</span>
    fail_text = <span foreground="##FF5555"> Wrong! </span>
    hide_input = false              # Show/hide password dots
    position = 0, -210
    halign = center
    valign = center
}

label {
    monitor =
    #clock
    text = cmd[update:1000] echo "$TIME12"
    color = rgb(F8F8F2)
    font_size = 70
    font_family = Noto Sans Mono
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

label {
    monitor =
    text = $USER
    color = rgb(F8F8F2)
    font_size = 20
    font_family = Noto Sans Mono
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
