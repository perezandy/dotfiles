general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Screen Dimmer
listener {
    timeout = 150
    on-timeout = gammastep -m wayland -l 0:0 -t 6500:6500 -b 0.1 -r
    on-resume  = pkill gammastep
}

# Screen Locker
listener {
    timeout = 300
    on-timeout = hyprlock -c ~/.config/hypr/hyprlock/hyprlock.conf
}

listener {
  event = lid-close
  on-event = hyprlock -c ~/.config/hypr/hyprlock/hyprlock.conf
}

listener {
  event = lid-close
  on-event = hyprctl dispatch dpms off eDP-1
}

listener {
  event = lid-open
  on-event = hyprctl dispatch dpms on eDP-1
}
