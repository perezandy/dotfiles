[colors]
bg = #1e1e2e
fg = #a47dab
bg-alt = #313244
accent = #a277ff
dis = #45475a
ugt = #f38ba8

[bar/main]
width = 100%
height = 40px
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}
monitor = ${env:MONITOR:}
line-size = 3px
line-color = ${colors.accent}

border-size = 8px
border-color = ${colors.bg}

padding-left = 0
padding-right = 0
module-margin = 4px

font-0 = "Symbols Nerd Font Mono:style=bold:size=12;2"
font-1 = "Manrope:style=bold:size=12;2"

modules-left = i3
modules-right = pulseaudio date battery power 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true


[module/i3]
type = internal/i3

format = <label-state>
label-focused = %index%
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}
label-focused-padding = 4

label-unfocused = %index%
label-unfocused-foreground = ${colors.accent}
label-unfocused-background = ${colors.bg-alt}
label-unfocused-padding = 4

label-visible = %index%
label-visible-foreground = ${colors.accent}
label-visible-background = ${colors.bg-alt}
label-visible-padding = 4

label-urgent = %index%
label-urgent-foreground = ${colors.bg}
label-urgent-background = ${colors.ugt}
label-urgent-padding = 4

pin-workspaces = true
strip-wsnumbers = true
index-sort = true
reverse-scroll = false

[module/cpu]
type = internal/cpu

; Seconds to sleep between updates
; Default: 1
interval = 1

; Available tags:
;   <label> (default)
;   <bar-load>
;   <ramp-load>
;   <ramp-coreload>
;;format = <label> <ramp-coreload>
format = <label>
format-prefix = ůįĽ†
format-prefix-foreground = ${colors.bg-alt}
format-prefix-background = ${colors.accent}
format-prefix-padding = 4

; Available tokens:
;   %percentage% (default) - total cpu load averaged over all cores
;   %percentage-sum% - Cumulative load on all cores
;   %percentage-cores% - load percentage for each core
;   %percentage-core[1-9]% - load percentage for specific core
label = "%percentage%%"
label-background = ${colors.bg-alt}
label-foreground = ${colors.accent}
label-padding = 4

; Spacing between individual per-core ramps
;;ramp-coreload-spacing = 1
;;ramp-coreload-0 = ${cpu.load0}
;;ramp-coreload-1 = ${cpu.load1}

;;ramp-load-0 = ${cpu.load0}
;;ramp-load-1 = ${cpu.load1}

[module/pulseaudio]
type = internal/pulseaudio

; Sink to be used, if it exists (find using `pacmd list-sinks`, name field)
; If not, uses default sink
sink = alsa_output.pci-0000_03_00.6.analog-stereo

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = false

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

; Available tags:
;   <label-volume> (default)
;   <ramp-volume>
;   <bar-volume>
format-volume = <ramp-volume><label-volume>

format-muted-prefix = ůįĚü
format-muted-prefix-background = ${colors.accent}
format-muted-prefix-foreground = ${colors.bg-alt}
format-muted-prefix-padding = 4

label-volume = %percentage%%
label-volume-background = ${colors.bg-alt}
label-volume-foreground = ${colors.accent}
label-volume-padding = 4

label-muted = "0%"
label-muted-foreground = ${colors.accent}
label-muted-background = ${colors.bg-alt}
label-muted-padding = 4

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-background = ${colors.accent}
ramp-volume-foreground = ${colors.bg-alt}
ramp-volume-padding = 4

[module/memory]
type = internal/memory

; Seconds to sleep between updates
; Default: 1
interval = 1

; Available tags:
;   <label> (default)
;   <bar-used>
;   <bar-free>
;   <ramp-used>
;   <ramp-free>
;   <bar-swap-used>
;   <bar-swap-free>
;   <ramp-swap-used>
;   <ramp-swap-free>
format = <label>
format-prefix = ůįćõ
format-prefix-background = ${colors.accent}
format-prefix-foreground = ${colors.bg-alt}
format-prefix-padding = 4

; Available tokens:
;   %percentage_used% (default)
;   %percentage_free%
;   %gb_used%
;   %gb_free%
;   %gb_total%
;   %mb_used%
;   %mb_free%
;   %mb_total%
;   %percentage_swap_used%
;   %percentage_swap_free%
;   %mb_swap_total%
;   %mb_swap_free%
;   %mb_swap_used%
;   %gb_swap_total%
;   %gb_swap_free%
;   %gb_swap_used%

label = "%gb_used%"
label-background = ${colors.bg-alt}
label-foreground = ${colors.accent}
label-padding = 4

; Only applies if <ramp-used> is used
;;ramp-used-0 = ${memory.used0}
;;ramp-used-1 = ${memory.used1}
;;ramp-used-2 = ${memory.used2}

; Only applies if <ramp-free> is used
;;ramp-free-0 = ${memory.free0}
;;ramp-free-1 = ${memory.free1}
;;ramp-free-2 = ${memory.free2}

[module/date]
type = internal/date

; Seconds to sleep between updates
interval = 1.0

; See "http://en.cppreference.com/w/cpp/io/manip/put_time" for details on how to format the date string
; NOTE: if you want to use syntax tags here you need to use %%{...}
;;date = %Y-%m-%d%

; Optional time format
time = "%I:%M %p"

; if `date-alt` or `time-alt` is defined, clicking
; the module will toggle between formats
;;date-alt = %A, %d %B %Y
time-alt = "%a, %d %b %Y"

; Available tags:
;   <label> (default)
format = <label>
format-prefix = ůĪĎā
format-prefix-background = ${colors.accent}
format-prefix-foreground = ${colors.bg-alt}
format-prefix-padding = 4

; Available tokens:
;   %date%
;   %time%
; Default: %date%
label = %time%
label-background = ${colors.bg-alt}
label-foreground = ${colors.accent}
label-padding = 4

[module/power]
type = custom/text
content = ÔÄĎ
content-padding = 12px
content-background = ${colors.accent}
content-foreground = ${colors.bg}
click-left = /home/andy/.config/rofi/powermenu/powermenu.sh

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT1
adapter = ACAD
poll-interval = 5

format-full-prefix = ůĪüĘ
format-full-prefix-background = ${colors.accent}
format-full-foreground = ${colors.accent}
format-full-background = ${colors.bg-alt}
format-full-prefix-foreground = ${colors.bg-alt}
format-full-prefix-padding = 4
label-full-padding = 4

format-discharging-prefix = ůĪüě
format-discharging-prefix-background = ${colors.accent}
format-discharging-prefix-foreground = ${colors.bg-alt}
format-discharging-foreground = ${colors.accent}
format-discharging-background = ${colors.bg-alt}
format-discharging-prefix-padding = 4
label-discharging-padding = 4

format-charging-prefix = ůĪü†
format-charging-prefix-background = ${colors.accent}
format-charging-prefix-foreground = ${colors.bg-alt}
format-charging-foreground = ${colors.accent}
format-charging-background = ${colors.bg-alt}
format-charging-prefix-padding = 4
label-charging-padding = 4

format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging =%percentage%% 
label-discharging =%percentage%%
label-full = "100%"
label-low = "<5%"
